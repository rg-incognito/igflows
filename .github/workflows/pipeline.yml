name: Bike IG Reels Pipeline

on:
  schedule:
    # 6x per day — IST times (UTC+5:30)
    - cron: '0 2 * * *'    # 7:30 AM IST
    - cron: '0 5 * * *'    # 10:30 AM IST
    - cron: '0 8 * * *'    # 1:30 PM IST
    - cron: '0 11 * * *'   # 4:30 PM IST
    - cron: '0 14 * * *'   # 7:30 PM IST
    - cron: '0 17 * * *'   # 10:30 PM IST

  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if daily limit reached'
        required: false
        default: 'false'

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg + Node.js for yt-dlp EJS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg nodejs
          ffmpeg -version | head -1
          node --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements_ci.txt') }}

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Write credentials from secrets
        env:
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
        run: |
          mkdir -p music output/temp logs
          echo "$GDRIVE_TOKEN_JSON" > drive_token.json
          # ig_session.json is written by the pipeline itself from IG_SESSION_JSON env var

      - name: Download state from Google Drive
        env:
          GDRIVE_FOLDER_ID: "1CivbmOzwqkCmyOZmmC7UC2p6EGDitjCB"
        run: python drive_manager.py download_state

      - name: Run pipeline
        env:
          GDRIVE_FOLDER_ID:       "1CivbmOzwqkCmyOZmmC7UC2p6EGDitjCB"
          IG_USERNAME:            ${{ secrets.IG_USERNAME }}
          IG_PASSWORD:            ${{ secrets.IG_PASSWORD }}
          IG_SESSION_JSON:        ${{ secrets.IG_SESSION_JSON }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:          ${{ github.run_id }}
          FORCE_RUN:              ${{ github.event.inputs.force_run }}
          YT_COOKIES:             ${{ secrets.YT_COOKIES }}
        run: python pipeline_ci.py

      - name: Upload state back to Google Drive
        if: always()
        env:
          GDRIVE_FOLDER_ID: "1CivbmOzwqkCmyOZmmC7UC2p6EGDitjCB"
        run: python drive_manager.py upload_state
